<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tic Tac Toe</title>
    <link href="css/style.css" rel="stylesheet">
  </head>
  <body>

    <section id="scoreboard">
      <div id="player">
        <h3>Your Score</h3>
        <p>0</p>
      </div>
      <div id="comp">
        <h3>Computer Score</h3>
        <p>0</p>
      </div>
    </section>

    <section id="selection">
      <button class="select" id="rock">Rock</button>
      <button class="select" id="paper">Paper</button>
      <button class="select" id="sci">Scissor</button>
    </section>

    <script src='js/script.js'></script>
  </body>
</html>
